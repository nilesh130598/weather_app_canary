apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
spec: 
  replicas: {{ .Values.backend.replicas }}

  strategy: 
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels: 
        app: backend    

    spec: 
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        imagePullPolicy: Always

        ports:
        - containerPort: {{ .Values.backend.port }}

        env:
        - name: PORT
          value: "5000"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"    

        readinessProbe:
          httpGet:
            path: /
            port: 5000
            scheme: HTTP

          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3   

        livenessProbe:
          httpGet:
            path: /
            port: 5000
            scheme: HTTP

          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3           