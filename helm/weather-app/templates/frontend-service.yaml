apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: frontend

  # ports:
  # - port: {{ .Values.service.frontendPort }}
  #   targetPort: {{ .Values.frontend.port }}
    
  ports:
  - name: http
    port: 80
    targetPort: 80

  - name: https
    port: 443
    targetPort: 443   

  type: NodePort
